name: Bootstrap — store dispatch token

on:
  workflow_dispatch:
    inputs:
      token:
        description: "Token to store as dispatch token"
        required: true
        type: string
  repository_dispatch:
    types: [bootstrap]

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Store dispatch token in config/dispatch-token
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TOKEN: ${{ inputs.token || github.event.client_payload.dispatch_token }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, urllib.request, urllib.error

          gh_token   = os.environ["GH_TOKEN"]
          new_token  = os.environ["INPUT_TOKEN"]
          repo       = os.environ["REPO"]
          path       = "config/dispatch-token"

          encoded = base64.b64encode(new_token.encode()).decode()

          # Check if file exists (to get SHA for update)
          check = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{path}",
              headers={"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"}
          )
          sha = None
          try:
              with urllib.request.urlopen(check) as r:
                  sha = json.loads(r.read()).get("sha")
          except:
              pass

          payload = {"message": "chore: update dispatch-token [skip ci]", "content": encoded}
          if sha:
              payload["sha"] = sha

          put_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/contents/{path}",
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {gh_token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json",
              },
              method="PUT",
          )
          with urllib.request.urlopen(put_req) as r:
              print(f"dispatch-token stored: HTTP {r.status}")
          PYEOF
