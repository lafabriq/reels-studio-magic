name: Get Instagram Reel URL

on:
  repository_dispatch:
    types: [get_reel]

permissions:
  contents: write

jobs:
  fetch-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Fetch Instagram video URL and write result
        env:
          REEL_URL:     ${{ github.event.client_payload.reel_url }}
          REQUEST_ID:   ${{ github.event.client_payload.request_id }}
          IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}
          GH_TOKEN:     ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, urllib.request, urllib.error, base64

          reel_url    = os.environ.get("REEL_URL", "")
          request_id  = os.environ.get("REQUEST_ID", "")
          session_id  = os.environ.get("IG_SESSION_ID", "")
          gh_token    = os.environ.get("GH_TOKEN", "")
          repo        = os.environ.get("GITHUB_REPOSITORY", "")

          def write_result(obj):
              content = base64.b64encode(json.dumps(obj).encode()).decode()
              path = f"results/reel-{request_id}.json"
              check = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  headers={"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"}
              )
              sha = None
              try:
                  with urllib.request.urlopen(check) as r:
                      sha = json.loads(r.read()).get("sha")
              except:
                  pass
              payload = {"message": f"reel:{request_id}", "content": content}
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {gh_token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json",
                  },
                  method="PUT",
              )
              with urllib.request.urlopen(req) as r:
                  print(f"Result written: {r.status}")

          m = re.search(r"(?:reel|p|tv)/([A-Za-z0-9_-]+)", reel_url)
          if not m:
              write_result({"req": request_id, "error": "Неверная ссылка на Instagram Reel"})
          elif not session_id:
              write_result({"req": request_id, "error": "Сначала войди в Instagram через сайт"})
          else:
              shortcode = m.group(1)
              try:
                  ig_req = urllib.request.Request(
                      f"https://i.instagram.com/api/v1/media/by/shortcode?shortcode={shortcode}",
                      headers={
                          "User-Agent": "Instagram 289.0.0.77.109 Android (28/9; 420dpi; 1080x2220; samsung; SM-A505F; a50; exynos9610; en_US; 314665256)",
                          "Cookie": f"sessionid={session_id}",
                          "X-IG-App-ID": "567067343352427",
                          "Accept-Language": "en-US",
                          "Accept": "*/*",
                      }
                  )
                  with urllib.request.urlopen(ig_req, timeout=15) as resp:
                      data = json.loads(resp.read())
                  media = data.get("media", data)
                  versions = sorted(
                      media.get("video_versions", []),
                      key=lambda v: -(v.get("width", 0) * v.get("height", 0))
                  )
                  if versions:
                      write_result({"req": request_id, "url": versions[0]["url"]})
                  else:
                      write_result({"req": request_id, "error": "Видео не найдено — Reel приватный или ссылка устарела"})
              except urllib.error.HTTPError as e:
                  if e.code in (401, 403):
                      write_result({"req": request_id, "error": "Сессия Instagram истекла — войди снова"})
                  else:
                      write_result({"req": request_id, "error": f"Instagram ошибка {e.code}"})
              except Exception as e:
                  write_result({"req": request_id, "error": str(e)})
          PYEOF
