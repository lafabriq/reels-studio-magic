name: Instagram Login

on:
  repository_dispatch:
    types: [ig_login]

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Login to Instagram and write result
        env:
          IG_USERNAME: ${{ github.event.client_payload.username }}
          IG_PASSWORD: ${{ github.event.client_payload.password }}
          REQUEST_ID:  ${{ github.event.client_payload.request_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, urllib.request, urllib.parse, urllib.error, time

          username   = os.environ.get("IG_USERNAME", "")
          password   = os.environ.get("IG_PASSWORD", "")
          request_id = os.environ.get("REQUEST_ID", "")
          gh_token   = os.environ.get("GH_TOKEN", "")
          repo       = os.environ.get("GITHUB_REPOSITORY", "")

          IG_HEADERS = {
              "User-Agent": "Instagram 289.0.0.77.109 Android (28/9; 420dpi; 1080x2220; samsung; SM-A505F; a50; exynos9610; en_US; 314665256)",
              "Accept-Language": "en-US",
              "Accept": "*/*",
              "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
              "X-IG-App-ID": "567067343352427",
              "X-IG-Device-ID": "3a1fb4e4-2b58-4de5-afc1-4beb0b42d27e",
              "X-IG-Android-ID": "android-ba4b3e6d4fd2a0f3",
              "X-IG-Capabilities": "3brTvwM=",
              "X-IG-Connection-Type": "WIFI",
          }

          def write_result(obj):
              """Write JSON result to results/ig-login-{request_id}.json in the repo."""
              import base64
              content = base64.b64encode(json.dumps(obj).encode()).decode()
              path = f"results/ig-login-{request_id}.json"
              # Check if file exists to get SHA for update
              check = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  headers={"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"}
              )
              sha = None
              try:
                  with urllib.request.urlopen(check) as r:
                      sha = json.loads(r.read()).get("sha")
              except:
                  pass
              payload = {"message": f"result:{request_id}", "content": content}
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {gh_token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json",
                  },
                  method="PUT",
              )
              with urllib.request.urlopen(req) as r:
                  print(f"Result written: {r.status}")

          def write_config(path, content):
              """Write a plain-text value to a config file in the repo."""
              encoded = base64.b64encode(content.encode()).decode()
              check = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  headers={"Authorization": f"Bearer {gh_token}", "Accept": "application/vnd.github.v3+json"}
              )
              sha = None
              try:
                  with urllib.request.urlopen(check) as r:
                      sha = json.loads(r.read()).get("sha")
              except:
                  pass
              payload = {"message": f"chore: update {path} [skip ci]", "content": encoded}
              if sha:
                  payload["sha"] = sha
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/contents/{path}",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {gh_token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json",
                  },
                  method="PUT",
              )
              with urllib.request.urlopen(req) as r:
                  print(f"{path} written: HTTP {r.status}")

          # --- Step 1: try to login ---
          enc_pass = urllib.parse.quote(password, safe="")
          ts = int(time.time())
          enc_password = f"#PWD_INSTAGRAM_BROWSER:0:{ts}:{password}"

          login_headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              "Accept": "*/*",
              "Content-Type": "application/x-www-form-urlencoded",
              "X-Instagram-AJAX": "1",
              "X-CSRFToken": "initcsrf",
              "X-Requested-With": "XMLHttpRequest",
              "Referer": "https://www.instagram.com/",
              "Cookie": "csrftoken=initcsrf",
          }
          login_data = urllib.parse.urlencode({
              "username": username,
              "enc_password": enc_password,
              "queryParams": "{}",
              "optIntoOneTap": "false",
          }).encode()
          login_req = urllib.request.Request(
              "https://www.instagram.com/accounts/login/ajax/",
              data=login_data, headers=login_headers, method="POST"
          )
          try:
              with urllib.request.urlopen(login_req, timeout=20) as r:
                  cookies = r.headers.get("Set-Cookie", "")
                  body = r.read().decode(errors="ignore")
              status_code = 200
          except urllib.error.HTTPError as e:
              cookies = e.headers.get("Set-Cookie", "")
              body = e.read().decode(errors="ignore")
              status_code = e.code

          print(f"Login HTTP {status_code}")
          sid_match = re.search(r"sessionid=([^;,\s]+)", cookies)

          if sid_match:
              sessionid = sid_match.group(1)
              print("Login SUCCESS — storing sessionid")
              write_config("config/ig-session", sessionid)
              write_result({"req": request_id, "status": "ok"})
          else:
              try:
                  data = json.loads(body)
              except:
                  data = {"raw": body[:200]}
              print(f"Login data: {json.dumps(data)[:300]}")

              if "checkpoint_required" in body or "checkpoint_url" in str(data):
                  checkpoint_url = data.get("checkpoint_url", "")
                  print(f"Checkpoint required: {checkpoint_url}")
                  write_result({
                      "req": request_id,
                      "status": "checkpoint",
                      "checkpoint_url": checkpoint_url,
                  })
              elif "two_factor_required" in body:
                  write_result({"req": request_id, "status": "error", "error": "Требуется двухфакторная аутентификация (2FA)"})
              elif "bad_password" in body:
                  write_result({"req": request_id, "status": "error", "error": "Неверный пароль"})
              else:
                  write_result({"req": request_id, "status": "error", "error": f"Instagram ответил: {body[:200]}"})
          PYEOF
