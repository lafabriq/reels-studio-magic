name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Load dispatch token
        id: dispatch_token
        run: |
          TOKEN=$(cat config/dispatch-token 2>/dev/null | python3 -c "import sys,base64; print(base64.b64decode(sys.stdin.read().strip()).decode())" 2>/dev/null || echo "")
          echo "value=$TOKEN" >> $GITHUB_OUTPUT
        
      - name: Build project
        run: npm run build
        env:
          # Read from config/dispatch-token file (written by bootstrap workflow)
          VITE_GITHUB_TOKEN: ${{ steps.dispatch_token.outputs.value }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
